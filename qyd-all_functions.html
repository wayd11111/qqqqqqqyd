<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全部功能 - 供应商工作台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f4f7fc; font-family: 'Segoe UI', Roboto, sans-serif; padding: 30px 24px; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        /* 页面头部 */
        .page-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }
        .back-btn {
            background: none;
            border: none;
            font-size: 16px;
            color: #29a672;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .back-btn:hover { color: #1f8a5c; }
        h1 { font-size: 24px; color: #1e2a3e; }
        
        /* 分类卡片 */
        .section-card {
            background: #fff;
            border-radius: 20px;
            border: 1px solid #e9edf2;
            padding: 24px;
            margin-bottom: 24px;
        }
        .section-title {
            font-size: 18px;
            font-weight: bold;
            color: #1e2a3e;
            padding-bottom: 14px;
            border-bottom: 2px solid #f0f2f5;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .func-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 16px;
        }
        .func-card {
            text-align: center;
            padding: 16px 12px;
            background: #f8fafc;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .func-card:hover {
            background: #e8f5e9;
            transform: translateY(-2px);
        }
        .func-card i {
            font-size: 28px;
            margin-bottom: 8px;
            display: block;
        }
        .func-card span {
            font-size: 13px;
            color: #333;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="page-header">
        <button class="back-btn" onclick="history.back()"><i class="fas fa-arrow-left"></i> 返回</button>
        <h1><i class="fas fa-th-large" style="color: #29a672;"></i> 全部功能</h1>
    </div>

    <!-- 商品管理 -->
    <div class="section-card">
        <div class="section-title"><i class="fas fa-box" style="color: #29a672;"></i> 商品管理</div>
        <div class="func-grid">
            <div class="func-card" onclick="location.href='qyd-publish_product.html'"><i class="fas fa-cloud-upload-alt" style="color: #29a672;"></i><span>发布商品</span></div>
            <div class="func-card" onclick="location.href='qyd-all-products.html'"><i class="fas fa-boxes" style="color: #3498db;"></i><span>商品管理</span></div>
            <div class="func-card" onclick="location.href='qyd-category-mgr.html'"><i class="fas fa-tags" style="color: #9b59b6;"></i><span>分类管理</span></div>
            <div class="func-card" onclick="location.href='qyd-stock-warning.html'"><i class="fas fa-exclamation-triangle" style="color: #e67e22;"></i><span>库存预警</span></div>
        </div>
    </div>

    <!-- 订单管理 -->
    <div class="section-card">
        <div class="section-title"><i class="fas fa-shopping-cart" style="color: #e74c3c;"></i> 订单管理</div>
        <div class="func-grid">
            <div class="func-card" onclick="location.href='qyd-order-list.html'"><i class="fas fa-list" style="color: #e74c3c;"></i><span>订单列表</span></div>
            <div class="func-card" onclick="location.href='qyd-after-sale.html'"><i class="fas fa-exchange-alt" style="color: #e67e22;"></i><span>售后管理</span></div>
            <div class="func-card" onclick="location.href='qyd-refund-list.html'"><i class="fas fa-undo-alt" style="color: #e74c3c;"></i><span>退款管理</span></div>
            <div class="func-card" onclick="location.href='qyd-invoice.html'"><i class="fas fa-file-invoice" style="color: #29a672;"></i><span>开票助手</span></div>
        </div>
    </div>

    <!-- 物流与配送 -->
    <div class="section-card">
        <div class="section-title"><i class="fas fa-truck" style="color: #1abc9c;"></i> 物流与配送</div>
        <div class="func-grid">
            <div class="func-card" onclick="location.href='qyd-logistics.html'"><i class="fas fa-truck-fast" style="color: #1abc9c;"></i><span>物流查询</span></div>
            <div class="func-card" onclick="location.href='qyd-shipping-template.html'"><i class="fas fa-box-open" style="color: #3498db;"></i><span>运费模板</span></div>
            <div class="func-card" onclick="location.href='qyd-address-mgr.html'"><i class="fas fa-map-marker-alt" style="color: #e67e22;"></i><span>地址管理</span></div>
            <div class="func-card" onclick="location.href='qyd-print-order.html'"><i class="fas fa-print" style="color: #7f8c8d;"></i><span>打印面单</span></div>
        </div>
    </div>

    <!-- 营销与推广 -->
    <div class="section-card">
        <div class="section-title"><i class="fas fa-bullhorn" style="color: #f39c12;"></i> 营销与推广</div>
        <div class="func-grid">
            <div class="func-card" onclick="location.href='qyd-promotion.html'"><i class="fas fa-bullhorn" style="color: #f39c12;"></i><span>促销活动</span></div>
            <div class="func-card" onclick="location.href='qyd-coupon.html'"><i class="fas fa-ticket-alt" style="color: #29a672;"></i><span>优惠券</span></div>
            <div class="func-card" onclick="location.href='qyd-seckill.html'"><i class="fas fa-stopwatch" style="color: #e74c3c;"></i><span>秒杀管理</span></div>
            <div class="func-card" onclick="location.href='qyd-bundle.html'"><i class="fas fa-layer-group" style="color: #9b59b6;"></i><span>组合套餐</span></div>
        </div>
    </div>

    <!-- 财务与数据 -->
    <div class="section-card">
        <div class="section-title"><i class="fas fa-chart-line" style="color: #29a672;"></i> 财务与数据</div>
        <div class="func-grid">
            <div class="func-card" onclick="location.href='qyd-cost-calc.html'"><i class="fas fa-calculator" style="color: #e67e22;"></i><span>成本计算</span></div>
            <div class="func-card" onclick="location.href='qyd-finance-record.html'"><i class="fas fa-chart-line" style="color: #29a672;"></i><span>财务流水</span></div>
            <div class="func-card" onclick="location.href='qyd-withdraw.html'"><i class="fas fa-hand-holding-usd" style="color: #3498db;"></i><span>提现管理</span></div>
            <div class="func-card" onclick="location.href='qyd-data-report.html'"><i class="fas fa-chart-pie" style="color: #9b59b6;"></i><span>数据报表</span></div>
        </div>
    </div>

    <!-- 店铺与客服 -->
    <div class="section-card">
        <div class="section-title"><i class="fas fa-store" style="color: #e67e22;"></i> 店铺与客服</div>
        <div class="func-grid">
            <div class="func-card" onclick="location.href='qyd-shop-setting.html'"><i class="fas fa-store" style="color: #e67e22;"></i><span>店铺设置</span></div>
            <div class="func-card" onclick="location.href='qyd-message.html'"><i class="fas fa-envelope" style="color: #29a672;"></i><span>消息中心</span></div>
            <div class="func-card" onclick="location.href='qyd-evaluation.html'"><i class="fas fa-star" style="color: #f39c12;"></i><span>评价管理</span></div>
            <div class="func-card" onclick="location.href='qyd-customer-service.html'"><i class="fas fa-headset" style="color: #1abc9c;"></i><span>在线客服</span></div>
        </div>
    </div>

    <!-- 账户与安全 -->
    <div class="section-card">
        <div class="section-title"><i class="fas fa-shield-alt" style="color: #e74c3c;"></i> 账户与安全</div>
        <div class="func-grid">
            <div class="func-card" onclick="location.href='qyd-profile.html'"><i class="fas fa-user-circle" style="color: #29a672;"></i><span>个人资料</span></div>
            <div class="func-card" onclick="location.href='qyd-change-pwd.html'"><i class="fas fa-lock" style="color: #e74c3c;"></i><span>修改密码</span></div>
            <div class="func-card" onclick="location.href='qyd-device-mgmt.html'"><i class="fas fa-laptop" style="color: #3498db;"></i><span>设备管理</span></div>
            <div class="func-card" onclick="location.href='certification.html'"><i class="fas fa-id-card" style="color: #9b59b6;"></i><span>资质认证</span></div>
        </div>
    </div>
</div>
<script>
// 云函数 HTTP 触发地址（固定不变）
const API_BASE = 'https://eco-project-d2grfzzu4ca135e6d-1423499375.ap-shanghai.app.tcloudbase.com';

// 调用云函数
async function callFunction(name, data) {
    const response = await fetch(`${API_BASE}/${name}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data || {})
    });
    return response.json();
}
</script>
</body>
</html>
