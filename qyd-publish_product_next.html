<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>商品预览 - 用户视角 | 发布前确认</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f7fb;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding-bottom: 60px;
        }

        /* 预览容器 */
        .preview-container {
            max-width: 1280px;
            margin: 24px auto;
            background: #fff;
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        /* 顶部提示栏 */
        .preview-toolbar {
            background: #2c3e4e;
            padding: 14px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            flex-wrap: wrap;
            gap: 12px;
        }
        .preview-toolbar span {
            font-size: 14px;
            background: rgba(255,255,240,0.2);
            padding: 5px 14px;
            border-radius: 30px;
        }
        .action-buttons {
            display: flex;
            gap: 16px;
        }
        .btn-back-edit {
            background: #f0b27a;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            color: #2c3e4e;
            transition: 0.2s;
        }
        .btn-publish {
            background: #29a672;
            border: none;
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-publish:hover, .btn-back-edit:hover {
            transform: translateY(-1px);
            filter: brightness(0.95);
        }

        /* 商品详情区域（完全模仿用户端样式） */
        .detail-header-nav {
            padding: 20px 28px 8px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #edf2f7;
            flex-wrap: wrap;
            gap: 16px;
        }
        .back-link {
            cursor: pointer;
            color: #5a6874;
            font-size: 14px;
            font-weight: 500;
        }
        .detail-shop-info {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }
        .shop-logo {
            width: 44px;
            height: 44px;
            background: #eef2fa;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
        }
        .shop-text {
            display: flex;
            flex-direction: column;
        }
        .shop-name {
            font-weight: bold;
            font-size: 15px;
        }
        .tag-zy {
            background: #ffe6e6;
            color: #c0392b;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 20px;
            margin-left: 8px;
        }
        .enter-shop-btn, .customer-service-btn {
            background: #f0f2f5;
            padding: 5px 14px;
            border-radius: 24px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .customer-service-btn {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .detail-main-content {
            display: flex;
            flex-wrap: wrap;
            gap: 32px;
            padding: 28px;
        }
        .detail-img-section {
            flex: 1.2;
            min-width: 280px;
        }
        .main-img-wrapper {
            position: relative;
            background: #fef9f0;
            border-radius: 28px;
            min-height: 380px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            border: 1px solid #f0e5d8;
        }
        .main-img-placeholder {
            width: 100%;
            height: 380px;
            object-fit: contain;
            border-radius: 28px;
        }
        .img-nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 20px;
        }
        .prev { left: 12px; }
        .next { right: 12px; }
        .fav-star {
            position: absolute;
            top: 16px;
            right: 16px;
            font-size: 28px;
            cursor: pointer;
            color: #ffb347;
            background: rgba(255,255,240,0.7);
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }
        .img-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 12px;
        }
        .dot {
            width: 8px;
            height: 8px;
            background: #ccc;
            border-radius: 50%;
            cursor: pointer;
        }
        .dot.active {
            background: #29a672;
            width: 22px;
            border-radius: 12px;
        }
        .thumb-bar {
            display: flex;
            gap: 12px;
            margin-top: 16px;
            overflow-x: auto;
        }
        .thumb-img {
            width: 70px;
            height: 70px;
            border-radius: 14px;
            object-fit: cover;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .thumb-img.active {
            border-color: #29a672;
        }
        .detail-info-section {
            flex: 1;
        }
        .detail-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 16px;
        }
        .detail-price-row {
            background: #fff6e8;
            padding: 12px 16px;
            border-radius: 20px;
            margin: 12px 0 20px;
        }
        .price-symbol {
            font-size: 18px;
            color: #e67e22;
        }
        .price-val {
            font-size: 32px;
            font-weight: bold;
            color: #e67e22;
        }
        .detail-spec-box {
            background: #fafbfd;
            padding: 18px;
            border-radius: 24px;
            margin: 20px 0;
        }
        .spec-item {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }
        .spec-item label {
            width: 55px;
            font-weight: 600;
            color: #3b4a5c;
        }
        .spec-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        .spec-tags .tag {
            background: #fff;
            border: 1px solid #dee2e6;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 13px;
            cursor: pointer;
        }
        .spec-tags .tag.active {
            background: #29a672;
            color: white;
            border-color: #29a672;
        }
        .qty-selector {
            display: flex;
            align-items: center;
            gap: 12px;
            background: white;
            border-radius: 40px;
            padding: 4px 8px;
            border: 1px solid #e2e8f0;
        }
        .qty-selector button {
            width: 32px;
            height: 32px;
            border-radius: 30px;
            border: none;
            background: #edf2f7;
            font-size: 18px;
            cursor: pointer;
        }
        .qty-selector input {
            width: 55px;
            text-align: center;
            border: none;
            font-size: 16px;
        }
        .purchase-actions {
            display: flex;
            gap: 16px;
            margin-top: 28px;
        }
        .btn-add-cart, .btn-buy-now {
            flex: 1;
            padding: 14px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            border: none;
        }
        .btn-add-cart {
            background: #fff0e0;
            color: #e67e22;
            border: 1px solid #ffe0b5;
        }
        .btn-buy-now {
            background: #29a672;
            color: white;
        }
        .detail-desc-section {
            padding: 24px 28px 40px;
            background: #fefef7;
            border-top: 1px solid #ececec;
        }
        .desc-block {
            margin-bottom: 28px;
        }
        .desc-block h4 {
            font-size: 18px;
            margin-bottom: 10px;
            font-weight: 600;
        }
        .desc-block p {
            color: #4b5563;
            line-height: 1.5;
        }
        .empty-preview-note {
            text-align: center;
            padding: 60px;
            color: #999;
        }
        @media (max-width: 750px) {
            .detail-main-content { flex-direction: column; }
            .preview-toolbar { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
<div class="preview-container" id="previewRoot">
    <!-- 顶部工具栏 -->
    <div class="preview-toolbar">
        <span><i class="fas fa-eye"></i> 用户视角预览 · 确认无误后再发布</span>
        <div class="action-buttons">
            <button class="btn-back-edit" id="backToEditBtn"><i class="fas fa-arrow-left"></i> 返回修改</button>
            <button class="btn-publish" id="confirmPublishBtn"><i class="fas fa-check-circle"></i> 确认发布</button>
        </div>
    </div>

    <!-- 动态商品预览区域（用户端样式） -->
    <div id="dynamicPreviewContent">
        <!-- 内容完全由js根据 localStorage/ sessionStorage 数据渲染 -->
        <div class="empty-preview-note">
            <i class="fas fa-spinner fa-pulse"></i> 加载预览数据...
        </div>
    </div>
</div>

<script>
    // 预览核心逻辑: 从 sessionStorage 读取商家填写的完整商品数据（包括多规格、多张主图、规格独立图片等）
    // 模拟真实发布前暂存数据
    let previewProduct = null;

    // 当前选中的规格索引（用于预览切换规格时更新价格/图片）
    let currentSpecIndex = 0;
    let currentMainImageIndex = 0;      // 商品主图轮播索引
    let productMainImages = [];           // 商品详情多图数组
    let favorite = false;                 // 收藏演示

    // 获取存储的商品草稿 (商家在发布页面点击预览时应该存入)
    function loadPreviewData() {
        // 优先从 sessionStorage 获取 'product_draft_preview'
        const stored = sessionStorage.getItem('product_draft_preview');
        if (stored) {
            try {
                previewProduct = JSON.parse(stored);
                console.log('加载预览数据:', previewProduct);
                renderPreviewPage();
            } catch(e) {
                showEmpty();
            }
        } else {
            // 演示用 mock 数据 (方便测试, 实际使用时商家填完会存入)
            // 模拟一套完整的商品数据 (包含多规格，多张主图)
            const mockData = {
                productName: "环保降解餐具套装 (豪华六件套)",
                category: "家居生活",
                description: "采用天然麦秆纤维+玉米淀粉材质，耐热120℃，可降解环保，适合家庭及户外。通过了FDA及欧盟检测。",
                shipping: "包邮",
                shipFrom: "浙江省杭州市",
                service: "7天无理由退换，破损包赔，一年质量保障",
                // 商品主图多张 (来自商品图片板块)
                productImages: [
                    "https://picsum.photos/id/20/600/400",   // 示例图
                    "https://picsum.photos/id/30/600/400",
                    "https://picsum.photos/id/43/600/400"
                ],
                // 多规格数据 (每个规格独立图片、价格、库存)
                specifications: [
                    {
                        name: "原木色",
                        price: 89.90,
                        stock: 156,
                        sku: "WOOD-01",
                        image: "https://picsum.photos/id/127/400/400"   // 规格专属图
                    },
                    {
                        name: "麦秆绿",
                        price: 92.00,
                        stock: 88,
                        sku: "GREEN-02",
                        image: "https://picsum.photos/id/29/400/400"
                    },
                    {
                        name: "竹纤维米",
                        price: 99.00,
                        stock: 42,
                        sku: "BAMBOO-03",
                        image: "https://picsum.photos/id/186/400/400"
                    }
                ],
                // 公共基础字段
                brand: "EcoPub",
                unit: "套"
            };
            previewProduct = mockData;
            renderPreviewPage();
        }
    }

    function showEmpty() {
        document.getElementById('dynamicPreviewContent').innerHTML = `<div class="empty-preview-note"><i class="fas fa-exclamation-triangle"></i> 暂无商品草稿，请先填写商品信息并点击“预览”</div>`;
    }

    // 渲染预览界面 (完全模拟用户端商品详情)
    function renderPreviewPage() {
        if (!previewProduct) {
            showEmpty();
            return;
        }
        // 提取数据
        const product = previewProduct;
        const specs = product.specifications || [];
        // 设置默认选中的规格 (若有规格默认选中第一个)
        if (specs.length > 0 && currentSpecIndex >= specs.length) currentSpecIndex = 0;
        const currentSpec = specs.length > 0 ? specs[currentSpecIndex] : null;
        // 商品主图数组 (优先使用 productImages, 若没有则用规格专属图或占位)
        let mainImages = (product.productImages && product.productImages.length) ? [...product.productImages] : [];
        if (mainImages.length === 0 && currentSpec && currentSpec.image) {
            mainImages = [currentSpec.image];
        }
        if (mainImages.length === 0) mainImages = ["https://picsum.photos/id/20/600/400"]; // fallback
        productMainImages = mainImages;
        if (currentMainImageIndex >= productMainImages.length) currentMainImageIndex = 0;

        // 当前展示的价格 (规格价格或默认)
        let displayPrice = currentSpec ? currentSpec.price : (product.defaultPrice || 89.90);
        let selectedSpecName = currentSpec ? currentSpec.name : (specs.length ? specs[0].name : "默认规格");
        
        // 构建html
        const specTagsHtml = specs.map((spec, idx) => {
            const activeClass = (idx === currentSpecIndex) ? 'active' : '';
            return `<span class="tag ${activeClass}" data-spec-index="${idx}">${escapeHtml(spec.name)}</span>`;
        }).join('');

        // 商品主图轮播点
        let dotsHtml = '';
        for (let i=0; i<productMainImages.length; i++) {
            dotsHtml += `<div class="dot ${i === currentMainImageIndex ? 'active' : ''}" data-img-index="${i}"></div>`;
        }
        // 缩略图栏
        let thumbsHtml = '';
        productMainImages.forEach((imgSrc, idx) => {
            thumbsHtml += `<img class="thumb-img ${idx === currentMainImageIndex ? 'active' : ''}" src="${imgSrc}" data-img-index="${idx}" style="width:60px;height:60px;object-fit:cover;">`;
        });

        const mainImageUrl = productMainImages[currentMainImageIndex];
        
        const fullHtml = `
            <div class="detail-header-nav">
                <div class="back-link" onclick="history.back()">❮ 返回商城</div>
                <div class="detail-shop-info">
                    <span class="shop-logo">🌿</span>
                    <div class="shop-text">
                        <div class="shop-name">${escapeHtml(product.brand || 'EcoPub')}官方旗舰店 <span class="tag-zy">自营</span></div>
                        <div class="enter-shop-btn" onclick="alert('店铺主页(演示)')">进入店铺</div>
                    </div>
                    <div class="customer-service-btn" onclick="alert('客服咨询(演示)')">
                        <span class="cs-icon">🎧</span>
                        <span class="cs-text">联系客服</span>
                    </div>
                </div>
            </div>

            <div class="detail-main-content">
                <div class="detail-img-section">
                    <div class="main-img-wrapper">
                        <button class="img-nav-btn prev" onclick="changeDetailImg(-1)">❮</button>
                        <img class="main-img-placeholder" src="${mainImageUrl}" alt="商品主图" style="width:100%; height:auto; min-height:320px; object-fit:contain;">
                        <button class="img-nav-btn next" onclick="changeDetailImg(1)">❯</button>
                        <div id="favBtn" class="fav-star" onclick="toggleFavorite()">${favorite ? '★' : '☆'}</div>
                        <div class="img-dots" id="imgDots">${dotsHtml}</div>
                    </div>
                    <div class="thumb-bar" id="thumbBar">${thumbsHtml}</div>
                </div>

                <div class="detail-info-section">
                    <h1 class="detail-title">${escapeHtml(product.productName)}</h1>
                    <div class="detail-price-row">
                        <span class="price-symbol">¥</span>
                        <span class="price-val" id="previewPrice">${displayPrice.toFixed(2)}</span>
                    </div>

                    <div class="detail-spec-box">
                        <div class="spec-item">
                            <label>规格</label>
                            <div class="spec-tags" id="specTagsContainer">
                                ${specTagsHtml}
                            </div>
                        </div>
                        <div class="spec-item">
                            <label>数量</label>
                            <div class="qty-selector">
                                <button onclick="changeQtyPreview(-1)">-</button>
                                <input type="number" id="buyQtyPreview" value="1" min="1" max="${currentSpec ? currentSpec.stock : 999}">
                                <button onclick="changeQtyPreview(1)">+</button>
                            </div>
                        </div>
                        ${currentSpec && currentSpec.stock ? `<div style="font-size:12px; color:#6c757d; margin-top: 6px;">库存: ${currentSpec.stock}件</div>` : ''}
                    </div>

                    <div class="purchase-actions">
                        <button class="btn-add-cart" onclick="alert('演示: 已加入购物车\\n实际发布后生效')">加入购物车</button>
                        <button class="btn-buy-now" onclick="alert('演示: 立即购买流程\\n商品发布后用户可下单')">立即购买</button>
                    </div>
                </div>
            </div>

            <div class="detail-desc-section">
                <div class="desc-block">
                    <h4>产品参数</h4>
                    <p>品牌：${escapeHtml(product.brand || '官方直供')}<br>分类：${escapeHtml(product.category || '家居用品')}<br>发货地：${escapeHtml(product.shipFrom || '默认仓')}<br>${product.unit ? `计量单位：${product.unit}` : ''}</p>
                </div>
                <div class="desc-block">
                    <h4>商品介绍</h4>
                    <p>${escapeHtml(product.description || '暂无详细介绍')}</p>
                </div>
                <div class="desc-block">
                    <h4>物流与售后</h4>
                    <p>运费: ${product.shipping || '包邮'} &nbsp;|&nbsp; 售后: ${product.service || '标准退换货政策'}</p>
                </div>
            </div>
        `;

        const container = document.getElementById('dynamicPreviewContent');
        container.innerHTML = fullHtml;

        // 绑定规格点击事件 (重新渲染后重新绑定)
        document.querySelectorAll('.spec-tags .tag').forEach(tag => {
            tag.addEventListener('click', (e) => {
                const idx = parseInt(tag.getAttribute('data-spec-index'));
                if (!isNaN(idx) && previewProduct.specifications && idx !== currentSpecIndex) {
                    currentSpecIndex = idx;
                    renderPreviewPage();  // 重新渲染以更新价格和规格图片
                }
            });
        });

        // 绑定缩略图和大图点切换
        document.querySelectorAll('.thumb-img').forEach(thumb => {
            thumb.addEventListener('click', (e) => {
                const imgIdx = parseInt(thumb.getAttribute('data-img-index'));
                if (!isNaN(imgIdx)) {
                    currentMainImageIndex = imgIdx;
                    renderPreviewPage();
                }
            });
        });
        document.querySelectorAll('.dot').forEach(dot => {
            dot.addEventListener('click', (e) => {
                const idx = parseInt(dot.getAttribute('data-img-index'));
                if (!isNaN(idx)) {
                    currentMainImageIndex = idx;
                    renderPreviewPage();
                }
            });
        });
    }

    // 全局辅助方法
    window.changeDetailImg = function(direction) {
        if (!productMainImages.length) return;
        let newIndex = currentMainImageIndex + direction;
        if (newIndex < 0) newIndex = productMainImages.length - 1;
        if (newIndex >= productMainImages.length) newIndex = 0;
        currentMainImageIndex = newIndex;
        renderPreviewPage();
    };
    window.toggleFavorite = function() {
        favorite = !favorite;
        renderPreviewPage();
    };
    window.changeQtyPreview = function(delta) {
        const input = document.getElementById('buyQtyPreview');
        if (input) {
            let val = parseInt(input.value) || 1;
            val += delta;
            if (val < 1) val = 1;
            const specs = previewProduct?.specifications;
            let maxStock = 9999;
            if (specs && specs[currentSpecIndex]) maxStock = specs[currentSpecIndex].stock;
            if (val > maxStock) val = maxStock;
            input.value = val;
        }
    };
    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // 返回修改（关闭预览回到商品发布页）
    document.getElementById('backToEditBtn')?.addEventListener('click', () => {
        if (confirm('返回修改会关闭预览，已填写的草稿不会丢失。确定返回？')) {
            window.location.href = 'qyd-publish_product.html';  // 实际改成你的商品发布页地址
        }
    });

    // 确认发布（正式提交后端）
    document.getElementById('confirmPublishBtn')?.addEventListener('click', async () => {
        if (!previewProduct) {
            alert('无商品数据，请先发布');
            return;
        }
        // 这里模拟提交到服务器
        const publishData = { ...previewProduct, publishStatus: 'published', publishTime: new Date().toISOString() };
        console.log('正式发布商品数据:', publishData);
        // 模拟请求
        const btn = document.getElementById('confirmPublishBtn');
        const originalText = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> 发布中...';
        btn.disabled = true;
        setTimeout(() => {
            alert(`✅ 商品“${previewProduct.productName}”已成功发布！\n包含 ${previewProduct.specifications?.length || 0} 个规格，${previewProduct.productImages?.length || 0} 张主图。\n商家可前往商品管理查看。`);
            // 发布成功后清除草稿并跳转（可自行调整）
            sessionStorage.removeItem('product_draft_preview');
            // 跳转到商品管理或商城首页
            // window.location.href = 'product-list.html';
            btn.innerHTML = originalText;
            btn.disabled = false;
        }, 1200);
    });

    // 页面初始化: 读取草稿数据
    loadPreviewData();

    // 监听来自发布页面的数据（如果发布页通过 window.opener 或 postMessage 传递数据可以增强，这里简单支持URL参数传递）
    // 也可以从 localStorage 获取最新草稿
    window.addEventListener('storage', (e) => {
        if (e.key === 'product_draft_preview') {
            loadPreviewData();
        }
    });
</script>
<script>
// 云函数 HTTP 触发地址（固定不变）
const API_BASE = 'https://eco-project-d2grfzzu4ca135e6d-1423499375.ap-shanghai.app.tcloudbase.com';

// 调用云函数
async function callFunction(name, data) {
    const response = await fetch(`${API_BASE}/${name}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data || {})
    });
    return response.json();
}
</script>
