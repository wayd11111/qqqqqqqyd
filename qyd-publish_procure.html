<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>发起新采购 - 企业端</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="qyd.css">
    <style>
        .publish-container { max-width: 600px; margin: 50px auto; background: white; padding: 40px; border-radius: 16px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; color: #555; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 8px; box-sizing: border-box; outline: none; transition: 0.3s; }
        .form-group input:focus { border-color: var(--primary-green); box-shadow: 0 0 8px rgba(41,166,114,0.1); }
        .btn-submit { width: 100%; padding: 15px; background: var(--primary-green); color: rgb(35, 32, 32); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; box-shadow: 0 8px 20px rgba(41,166,114,0.2); background-color: rgb(13, 185, 50);}
    </style>
</head>
<body style="background: #f8faf9;">
    <div class="publish-container">
        <a href="qyd.html" style="text-decoration: none; color: #999; font-size: 14px;"><i class="fas fa-arrow-left"></i> 返回工作台</a>
        <h2 style="color: var(--primary-green); margin: 20px 0;"><i class="fas fa-pen-nib"></i> 填写采购需求</h2>
        
        <div class="form-group">
            <label>项目名称</label>
            <input type="text" id="p-name" placeholder="例如：2026年度办公耗材采购">
        </div>
        <div class="form-group">
            <label>预算金额 (元)</label>
            <input type="number" id="p-price" placeholder="请输入最高预算">
        </div>
        <div class="form-group">
            <label>具体描述</label>
            <textarea id="p-desc" rows="4" placeholder="请详细说明采购需求..."></textarea>
        </div>
        
        <button class="btn-submit" onclick="alert('发布成功！(此处对接后端接口)')">立即发布需求</button>
    </div>
<script>
// 云函数 HTTP 触发地址（固定不变）
const API_BASE = 'https://eco-project-d2grfzzu4ca135e6d-1423499375.ap-shanghai.app.tcloudbase.com';

// 调用云函数
async function callFunction(name, data) {
    const response = await fetch(`${API_BASE}/${name}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data || {})
    });
    return response.json();
}
</script>
</body>
</html>
