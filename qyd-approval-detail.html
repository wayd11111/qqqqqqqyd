<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>待审批申请 - 供应商工作台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f4f7fc; font-family: 'Segoe UI', Roboto, sans-serif; padding: 30px 24px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .card { background: #fff; border-radius: 20px; border: 1px solid #e9edf2; padding: 28px 32px; margin-bottom: 24px; }
        .page-header { display: flex; align-items: center; gap: 20px; margin-bottom: 24px; flex-wrap: wrap; }
        .back-btn { background: none; border: none; font-size: 16px; color: #29a672; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        h2 { color: #1e2a3e; }
        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 14px 12px; text-align: left; border-bottom: 1px solid #edf2f7; }
        th { background: #f8fafc; font-weight: 600; }
        .btn-approve { background: #29a672; color: white; border: none; padding: 6px 16px; border-radius: 30px; cursor: pointer; margin-right: 8px; }
        .btn-reject { background: #e74c3c; color: white; border: none; padding: 6px 16px; border-radius: 30px; cursor: pointer; }
        .status-badge { padding: 4px 12px; border-radius: 30px; font-size: 12px; background: #fff3e0; color: #e67e22; display: inline-block; }
    </style>
</head>
<body>
<div class="container">
    <div class="page-header">
        <button class="back-btn" onclick="history.back()"><i class="fas fa-arrow-left"></i> 返回工作台</button>
        <h2><i class="fas fa-clipboard-list" style="color: #e67e22;"></i> 待审批申请 (6项)</h2>
    </div>
    <div class="card">
        <div class="table-responsive">
            <table id="approvalTable">
                <thead><tr><th>申请类型</th><th>申请内容</th><th>申请人</th><th>提交时间</th><th>状态</th><th>操作</th></tr></thead>
                <tbody id="approvalBody"></tbody>
            </table>
        </div>
    </div>
</div>
<script>
    let approvals = [
        { id: 1, type: "商品上架", content: "环保餐具套装 新规格上架", applicant: "运营部-李萌", time: "2025-03-28 09:23", status: "pending" },
        { id: 2, type: "价格调整", content: "智能保温杯 降价促销", applicant: "市场部-王远", time: "2025-03-28 11:05", status: "pending" },
        { id: 3, type: "退款申请", content: "订单#8829 客户退款", applicant: "客服-张薇", time: "2025-03-27 16:20", status: "pending" },
        { id: 4, type: "供应商资质", content: "环保认证更新", applicant: "合规部-赵琳", time: "2025-03-27 10:15", status: "pending" },
        { id: 5, type: "库存调整", content: "实验室pH笔 补货申请", applicant: "仓储-刘强", time: "2025-03-26 14:30", status: "pending" },
        { id: 6, type: "活动报名", content: "618大促 提报申请", applicant: "营销-陈曦", time: "2025-03-26 09:00", status: "pending" }
    ];
    function renderApprovals() {
        const tbody = document.getElementById('approvalBody');
        tbody.innerHTML = approvals.map(a => `
            <tr>
                <td>${a.type}</td><td>${a.content}</td><td>${a.applicant}</td><td>${a.time}</td>
                <td><span class="status-badge">待审批</span></td>
                <td><button class="btn-approve" onclick="handleApprove(${a.id})">通过</button><button class="btn-reject" onclick="handleReject(${a.id})">拒绝</button></td>
            </tr>
        `).join('');
    }
    window.handleApprove = (id) => { approvals = approvals.filter(a => a.id !== id); alert('已通过'); renderApprovals(); if(approvals.length===0) document.querySelector('.card').innerHTML='<div style="text-align:center;padding:40px;">✅ 暂无待审批申请</div>'; };
    window.handleReject = (id) => { approvals = approvals.filter(a => a.id !== id); alert('已拒绝'); renderApprovals(); if(approvals.length===0) document.querySelector('.card').innerHTML='<div style="text-align:center;padding:40px;">✅ 暂无待审批申请</div>'; };
    renderApprovals();
</script>
<script>
// 云函数 HTTP 触发地址（固定不变）
const API_BASE = 'https://eco-project-d2grfzzu4ca135e6d-1423499375.ap-shanghai.app.tcloudbase.com';

// 调用云函数
async function callFunction(name, data) {
    const response = await fetch(`${API_BASE}/${name}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data || {})
    });
    return response.json();
}
</script>
</body>
</html>
