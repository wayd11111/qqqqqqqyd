<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>反馈监督 - EcoGov</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f4f7fc;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 30px 24px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 头部 */
        .page-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 24px;
        }
        .back-btn {
            background: none;
            border: none;
            font-size: 16px;
            color: #29a672;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        h1 {
            font-size: 24px;
            color: #1e2a3e;
        }

        /* 卡片样式 */
        .card {
            background: #fff;
            border-radius: 20px;
            border: 1px solid #e9edf2;
            padding: 28px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        .card-title {
            font-size: 18px;
            font-weight: bold;
            color: #1e2a3e;
            margin-bottom: 20px;
            padding-left: 12px;
            border-left: 4px solid #29a672;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* 表单样式 */
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #2c3e50;
        }
        .form-label .required {
            color: #e74c3c;
            margin-left: 4px;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #d0d7de;
            border-radius: 12px;
            font-size: 14px;
            transition: 0.2s;
            font-family: inherit;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #29a672;
            box-shadow: 0 0 0 3px rgba(41,166,114,0.1);
        }
        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .upload-area {
            border: 2px dashed #d0d7de;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .upload-area:hover {
            border-color: #29a672;
            background: #f6fef9;
        }
        .upload-area i {
            font-size: 32px;
            color: #29a672;
            margin-bottom: 8px;
        }

        .btn-primary {
            background: #29a672;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-primary:hover {
            background: #1f8a5c;
        }
        .btn-outline {
            background: white;
            border: 1px solid #d0d7de;
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
        }

        /* 反馈列表 */
        .feedback-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .feedback-item {
            background: #f8fafc;
            border-radius: 16px;
            padding: 18px;
            border: 1px solid #e9edf2;
            transition: 0.2s;
        }
        .feedback-item:hover {
            border-color: #29a672;
        }
        .feedback-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .feedback-type {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
        }
        .type-bug { background: #ffebee; color: #c62828; }
        .type-suggest { background: #e8f5e9; color: #2e7d32; }
        .type-other { background: #e3f2fd; color: #1976d2; }
        .feedback-status {
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 30px;
        }
        .status-pending { background: #fff3e0; color: #e67e22; }
        .status-processing { background: #e3f2fd; color: #1976d2; }
        .status-resolved { background: #e8f5e9; color: #2e7d32; }
        .feedback-title {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 8px;
        }
        .feedback-content {
            color: #555;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 12px;
        }
        .feedback-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: #888;
        }
        .reply-box {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #e9edf2;
            font-size: 13px;
            color: #29a672;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px;
            color: #888;
        }
        .empty-state i {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        /* 两列布局 */
        .two-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        @media (max-width: 900px) {
            .two-columns {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="page-header">
        <button class="back-btn" onclick="history.back()">
            <i class="fas fa-arrow-left"></i> 返回
        </button>
        <h1><i class="fas fa-comment-dots"></i> 反馈监督中心</h1>
    </div>

    <div class="two-columns">
        <!-- 左侧：提交反馈 -->
        <div class="card">
            <div class="card-title">
                <span><i class="fas fa-edit"></i> 提交反馈建议</span>
                <span style="font-size: 12px; color: #888;">您的意见对我们很重要</span>
            </div>
            
            <div class="form-group">
                <label class="form-label">反馈类型 <span class="required">*</span></label>
                <select id="feedbackType">
                    <option value="bug">🐛 功能异常/Bug</option>
                    <option value="suggest">💡 功能建议/优化</option>
                    <option value="other">📝 其他意见</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">标题 <span class="required">*</span></label>
                <input type="text" id="feedbackTitle" placeholder="请简要概括您的问题或建议">
            </div>

            <div class="form-group">
                <label class="form-label">详细描述 <span class="required">*</span></label>
                <textarea id="feedbackDesc" placeholder="请详细描述您遇到的问题或建议，包括操作步骤、期望效果等..."></textarea>
            </div>

            <div class="form-group">
                <label class="form-label">联系方式（选填）</label>
                <input type="text" id="feedbackContact" placeholder="手机号/邮箱，方便我们回复您">
            </div>

            <div class="form-group">
                <label class="form-label">上传截图（选填）</label>
                <div class="upload-area" id="uploadArea">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <p>点击上传截图</p>
                    <p style="font-size: 12px; color: #999;">支持 jpg、png，最多3张</p>
                </div>
                <input type="file" id="fileInput" multiple accept="image/*" style="display: none;">
                <div id="filePreview" style="display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap;"></div>
            </div>

            <div style="display: flex; justify-content: flex-end;">
                <button class="btn-primary" id="submitFeedbackBtn">
                    <i class="fas fa-paper-plane"></i> 提交反馈
                </button>
            </div>
        </div>

        <!-- 右侧：我的反馈记录 -->
        <div class="card">
            <div class="card-title">
                <span><i class="fas fa-history"></i> 我的反馈记录</span>
                <button class="btn-outline" id="refreshBtn" style="padding: 4px 16px; font-size: 12px;">
                    <i class="fas fa-sync-alt"></i> 刷新
                </button>
            </div>
            <div id="feedbackListContainer" class="feedback-list">
                <!-- 动态渲染反馈列表 -->
            </div>
        </div>
    </div>
</div>

<script>
    // ========== 反馈数据管理 ==========
    let feedbackList = [];

    // 从 localStorage 加载反馈数据
    function loadFeedbackData() {
        const saved = localStorage.getItem('userFeedbacks');
        if (saved) {
            try {
                feedbackList = JSON.parse(saved);
            } catch(e) {}
        }
        // 如果没有数据，添加一些演示数据
        if (feedbackList.length === 0) {
            feedbackList = [
                {
                    id: 1,
                    type: "bug",
                    title: "购物车数量修改后价格未实时更新",
                    content: "在购物车页面修改商品数量后，总价没有立即更新，需要刷新页面才能看到变化。",
                    contact: "user@example.com",
                    images: [],
                    status: "processing",
                    reply: "感谢反馈，我们已记录此问题，将在下个版本修复。",
                    createTime: "2026-04-15 14:30",
                    updateTime: "2026-04-16 09:00"
                },
                {
                    id: 2,
                    type: "suggest",
                    title: "建议增加一键签到功能",
                    content: "每天签到都要点好几次，建议首页增加一键签到按钮。",
                    contact: "",
                    images: [],
                    status: "pending",
                    reply: "",
                    createTime: "2026-04-14 10:20",
                    updateTime: "2026-04-14 10:20"
                },
                {
                    id: 3,
                    type: "other",
                    title: "希望能有更多绿色商品",
                    content: "目前的商品种类比较少，希望可以增加更多品类的绿色环保商品。",
                    contact: "138****1234",
                    images: [],
                    status: "resolved",
                    reply: "感谢您的建议，我们正在积极拓展供应商资源。",
                    createTime: "2026-04-10 16:45",
                    updateTime: "2026-04-12 11:30"
                }
            ];
            saveFeedbackData();
        }
        renderFeedbackList();
    }

    // 保存反馈数据
    function saveFeedbackData() {
        localStorage.setItem('userFeedbacks', JSON.stringify(feedbackList));
    }

    // 获取状态文本
    function getStatusText(status) {
        const map = {
            'pending': '待处理',
            'processing': '处理中',
            'resolved': '已解决'
        };
        return map[status] || status;
    }

    // 获取状态样式
    function getStatusClass(status) {
        const map = {
            'pending': 'status-pending',
            'processing': 'status-processing',
            'resolved': 'status-resolved'
        };
        return map[status] || '';
    }

    // 获取类型样式
    function getTypeClass(type) {
        const map = {
            'bug': 'type-bug',
            'suggest': 'type-suggest',
            'other': 'type-other'
        };
        return map[type] || '';
    }

    // 获取类型文本
    function getTypeText(type) {
        const map = {
            'bug': '🐛 功能异常',
            'suggest': '💡 功能建议',
            'other': '📝 其他意见'
        };
        return map[type] || type;
    }

    // 渲染反馈列表
    function renderFeedbackList() {
        const container = document.getElementById('feedbackListContainer');
        if (feedbackList.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-inbox"></i>
                    <p>暂无反馈记录</p>
                    <p style="font-size: 12px;">点击左侧提交您的第一条反馈</p>
                </div>
            `;
            return;
        }

        // 按时间倒序排列
        const sorted = [...feedbackList].sort((a, b) => new Date(b.createTime) - new Date(a.createTime));
        
        container.innerHTML = sorted.map(fb => `
            <div class="feedback-item">
                <div class="feedback-header">
                    <div>
                        <span class="feedback-type ${getTypeClass(fb.type)}">${getTypeText(fb.type)}</span>
                        <span class="feedback-status ${getStatusClass(fb.status)}">${getStatusText(fb.status)}</span>
                    </div>
                    <div style="font-size: 12px; color: #888;">${fb.createTime}</div>
                </div>
                <div class="feedback-title">${escapeHtml(fb.title)}</div>
                <div class="feedback-content">${escapeHtml(fb.content)}</div>
                ${fb.images && fb.images.length > 0 ? `<div style="display: flex; gap: 8px; margin-bottom: 12px;">${fb.images.map(img => `<img src="${img}" style="width: 60px; height: 60px; object-fit: cover; border-radius: 8px; cursor: pointer;" onclick="window.open(this.src)">`).join('')}</div>` : ''}
                <div class="feedback-footer">
                    <span>${fb.contact ? `📞 ${fb.contact}` : '匿名用户'}</span>
                    <span>反馈编号: #${fb.id}</span>
                </div>
                ${fb.reply ? `
                    <div class="reply-box">
                        <i class="fas fa-reply"></i> 官方回复：${escapeHtml(fb.reply)}
                    </div>
                ` : ''}
            </div>
        `).join('');
    }

    // 简单的HTML转义
    function escapeHtml(text) {
        if (!text) return '';
        return text.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // ========== 文件上传 ==========
    let uploadedImages = [];

    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const filePreview = document.getElementById('filePreview');

    if (uploadArea) {
        uploadArea.addEventListener('click', () => fileInput.click());
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#29a672';
        });
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.style.borderColor = '#d0d7de';
        });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#d0d7de';
            handleFiles(Array.from(e.dataTransfer.files));
        });
    }

    if (fileInput) {
        fileInput.addEventListener('change', (e) => {
            handleFiles(Array.from(e.target.files));
            fileInput.value = '';
        });
    }

    function handleFiles(files) {
        const maxImages = 3;
        files.forEach(file => {
            if (uploadedImages.length >= maxImages) {
                alert(`最多只能上传 ${maxImages} 张图片`);
                return;
            }
            if (!file.type.startsWith('image/')) return;
            if (file.size > 5 * 1024 * 1024) {
                alert(`图片 ${file.name} 超过5MB`);
                return;
            }
            const reader = new FileReader();
            reader.onload = (e) => {
                uploadedImages.push(e.target.result);
                renderFilePreview();
            };
            reader.readAsDataURL(file);
        });
    }

    function renderFilePreview() {
        filePreview.innerHTML = uploadedImages.map((img, idx) => `
            <div style="position: relative; width: 70px; height: 70px;">
                <img src="${img}" style="width: 100%; height: 100%; object-fit: cover; border-radius: 8px;">
                <button onclick="removeImage(${idx})" style="position: absolute; top: -6px; right: -6px; width: 20px; height: 20px; border-radius: 50%; background: #e74c3c; color: white; border: none; cursor: pointer; font-size: 12px;">&times;</button>
            </div>
        `).join('');
    }

    function removeImage(index) {
        uploadedImages.splice(index, 1);
        renderFilePreview();
    }

    // ========== 提交反馈 ==========
    function submitFeedback() {
        const type = document.getElementById('feedbackType').value;
        const title = document.getElementById('feedbackTitle').value.trim();
        const content = document.getElementById('feedbackDesc').value.trim();
        const contact = document.getElementById('feedbackContact').value.trim();

        if (!title) {
            alert('请填写标题');
            return;
        }
        if (!content) {
            alert('请填写详细描述');
            return;
        }

        const newId = feedbackList.length > 0 ? Math.max(...feedbackList.map(f => f.id)) + 1 : 1;
        
        const newFeedback = {
            id: newId,
            type: type,
            title: title,
            content: content,
            contact: contact,
            images: [...uploadedImages],
            status: "pending",
            reply: "",
            createTime: new Date().toLocaleString(),
            updateTime: new Date().toLocaleString()
        };

        feedbackList.unshift(newFeedback);
        saveFeedbackData();
        
        // 清空表单
        document.getElementById('feedbackTitle').value = '';
        document.getElementById('feedbackDesc').value = '';
        document.getElementById('feedbackContact').value = '';
        uploadedImages = [];
        renderFilePreview();
        
        // 重新渲染列表
        renderFeedbackList();
        
        alert('反馈已提交！感谢您的宝贵意见');
    }

    // 刷新列表
    function refreshList() {
        loadFeedbackData();
        alert('已刷新');
    }

    // 绑定事件
    document.getElementById('submitFeedbackBtn')?.addEventListener('click', submitFeedback);
    document.getElementById('refreshBtn')?.addEventListener('click', refreshList);

    // 初始化
    loadFeedbackData();
</script>
<script>
// 云函数 HTTP 触发地址（固定不变）
const API_BASE = 'https://eco-project-d2grfzzu4ca135e6d-1423499375.ap-shanghai.app.tcloudbase.com';

// 调用云函数
async function callFunction(name, data) {
    const response = await fetch(`${API_BASE}/${name}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data || {})
    });
    return response.json();
}
</script>
</body>
</html>
