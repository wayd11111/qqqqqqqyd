<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成本计算 - 供应商工作台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f4f7fc; font-family: 'Segoe UI', Roboto, sans-serif; padding: 30px 24px; }
        .container { max-width: 900px; margin: 0 auto; }
        .card { background: #fff; border-radius: 20px; border: 1px solid #e9edf2; padding: 28px 32px; margin-bottom: 24px; }
        .page-header { display: flex; align-items: center; gap: 20px; margin-bottom: 24px; }
        .back-btn { background: none; border: none; font-size: 16px; color: #29a672; cursor: pointer; }
        h2 { color: #1e2a3e; }
        .calc-row { display: flex; justify-content: space-between; margin-bottom: 20px; align-items: center; flex-wrap: wrap; gap: 12px; }
        .calc-row label { font-weight: 600; width: 140px; }
        .calc-row input, .calc-row select { flex: 1; padding: 10px 14px; border: 1px solid #d0d7de; border-radius: 10px; }
        .result-box { background: #e8f5e9; padding: 20px; border-radius: 16px; margin-top: 24px; text-align: center; }
        .result-price { font-size: 32px; font-weight: bold; color: #29a672; }
        .btn-calc { background: #29a672; color: white; border: none; padding: 12px 28px; border-radius: 40px; cursor: pointer; width: 100%; margin-top: 12px; }
    </style>
</head>
<body>
<div class="container">
    <div class="page-header">
        <button class="back-btn" onclick="history.back()"><i class="fas fa-arrow-left"></i> 返回工作台</button>
        <h2><i class="fas fa-calculator" style="color: #e67e22;"></i> 成本计算器</h2>
    </div>
    <div class="card">
        <div class="calc-row"><label>商品成本 (¥)</label><input type="number" id="costPrice" value="45.00" step="0.01"></div>
        <div class="calc-row"><label>物流费用 (¥)</label><input type="number" id="shippingCost" value="5.80" step="0.01"></div>
        <div class="calc-row"><label>平台佣金 (%)</label><input type="number" id="commission" value="5.0" step="0.1"></div>
        <div class="calc-row"><label>推广费用 (¥)</label><input type="number" id="adCost" value="2.00" step="0.01"></div>
        <div class="calc-row"><label>预期售价 (¥)</label><input type="number" id="sellPrice" value="89.90" step="0.01"></div>
        <button class="btn-calc" id="calcBtn"><i class="fas fa-chart-line"></i> 计算利润</button>
        <div class="result-box" id="resultBox">
            <div>预估毛利润</div>
            <div class="result-price" id="profitVal">¥37.10</div>
            <div>毛利率: <span id="marginRate">41.3%</span></div>
        </div>
    </div>
</div>
<script>
    function calculate() {
        const cost = parseFloat(document.getElementById('costPrice').value) || 0;
        const shipping = parseFloat(document.getElementById('shippingCost').value) || 0;
        const commissionRate = parseFloat(document.getElementById('commission').value) || 0;
        const ad = parseFloat(document.getElementById('adCost').value) || 0;
        const price = parseFloat(document.getElementById('sellPrice').value) || 0;
        const commissionFee = price * (commissionRate / 100);
        const totalCost = cost + shipping + ad + commissionFee;
        const profit = price - totalCost;
        const margin = profit / price * 100;
        document.getElementById('profitVal').innerText = `¥${profit.toFixed(2)}`;
        document.getElementById('marginRate').innerText = `${margin.toFixed(1)}%`;
        if(profit < 0) document.getElementById('resultBox').style.background = "#ffebee";
        else document.getElementById('resultBox').style.background = "#e8f5e9";
    }
    document.getElementById('calcBtn').addEventListener('click', calculate);
    calculate();
</script>
<script>
// 云函数 HTTP 触发地址（固定不变）
const API_BASE = 'https://eco-project-d2grfzzu4ca135e6d-1423499375.ap-shanghai.app.tcloudbase.com';

// 调用云函数
async function callFunction(name, data) {
    const response = await fetch(`${API_BASE}/${name}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data || {})
    });
    return response.json();
}
</script>
</body>
</html>
