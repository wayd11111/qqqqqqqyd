<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>物流查询 - 绿采智联</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0f7b3a;
            --primary-dark: #0a5c2c;
            --primary-light: #e8f5e9;
            --accent-blue: #2c7da0;
            --accent-orange: #e67e22;
            --accent-red: #e74c3c;
            --bg-gray: #f8fafc;
            --card-white: #ffffff;
            --border-light: #eef2f6;
            --text-main: #1e293b;
            --text-muted: #5b6e8c;
            --text-light: #94a3b8;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 8px 20px rgba(0, 0, 0, 0.06);
            --radius-lg: 20px;
            --radius-md: 14px;
            --radius-sm: 10px;
        }

        body {
            background: var(--bg-gray);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: var(--text-main);
            padding-bottom: 40px;
        }

        /* 头部 */
        .logistics-header {
            background: white;
            padding: 16px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-light);
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(10px);
        }

        .logo {
            font-weight: 700;
            font-size: 1.4rem;
            background: linear-gradient(135deg, var(--primary), var(--accent-blue));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .back-btn {
            background: none;
            border: 1px solid var(--border-light);
            padding: 8px 20px;
            border-radius: 40px;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .back-btn:hover {
            background: var(--primary-light);
            border-color: var(--primary);
            color: var(--primary);
        }

        /* 主容器 */
        .logistics-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 28px 24px;
        }

        /* 页面标题 */
        .page-title-section {
            margin-bottom: 28px;
        }

        .page-title-section h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .page-title-section h1 i {
            color: var(--primary);
            font-size: 28px;
        }

        .page-title-section p {
            color: var(--text-muted);
            margin-top: 8px;
            font-size: 0.9rem;
        }

        /* 查询卡片 */
        .query-card {
            background: var(--card-white);
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-bottom: 28px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-light);
        }

        .query-title {
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 16px;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .query-title i {
            color: var(--primary);
        }

        .query-input-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .query-input-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 12px;
            background: #f8fafc;
            border: 1px solid var(--border-light);
            border-radius: 60px;
            padding: 12px 20px;
            transition: all 0.2s;
        }

        .query-input-wrapper:focus-within {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 3px rgba(15,123,58,0.1);
        }

        .query-input-wrapper i {
            color: var(--text-light);
            font-size: 16px;
        }

        .query-input-wrapper input {
            flex: 1;
            border: none;
            background: none;
            outline: none;
            font-size: 14px;
            color: var(--text-main);
        }

        .query-input-wrapper input::placeholder {
            color: var(--text-light);
        }

        .query-btn {
            background: var(--primary);
            border: none;
            padding: 12px 32px;
            border-radius: 60px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .query-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        /* 最近查询记录 */
        .recent-section {
            margin-bottom: 28px;
        }

        .recent-title {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .recent-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .recent-tag {
            background: white;
            border: 1px solid var(--border-light);
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 13px;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
        }

        .recent-tag:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: var(--primary-light);
        }

        /* 物流详情卡片 */
        .track-card {
            background: var(--card-white);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-light);
            display: none;
        }

        /* 订单信息头部 */
        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 16px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-light);
            margin-bottom: 24px;
        }

        .order-info h3 {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .order-meta {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            font-size: 13px;
            color: var(--text-muted);
        }

        .order-meta span i {
            margin-right: 4px;
            width: 16px;
        }

        .status-badge {
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
        }

        .status-badge.delivering { background: #fff3e0; color: #e65100; }
        .status-badge.delivered { background: #e8f5e9; color: var(--primary); }
        .status-badge.processing { background: #e3f2fd; color: #1565c0; }
        .status-badge.exception { background: #ffebee; color: #c62828; }

        /* 物流轨迹时间轴 */
        .track-timeline {
            margin-bottom: 28px;
        }

        .timeline-title {
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 20px;
            color: var(--text-main);
        }

        .timeline-list {
            position: relative;
            padding-left: 30px;
        }

        .timeline-list::before {
            content: '';
            position: absolute;
            left: 9px;
            top: 8px;
            bottom: 8px;
            width: 2px;
            background: #e2e8f0;
        }

        .timeline-item {
            position: relative;
            padding-bottom: 24px;
        }

        .timeline-item:last-child {
            padding-bottom: 0;
        }

        .timeline-dot {
            position: absolute;
            left: -30px;
            top: 0;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: white;
            border: 2px solid #cbd5e1;
            z-index: 1;
        }

        .timeline-item.completed .timeline-dot {
            background: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(15,123,58,0.15);
        }

        .timeline-item.current .timeline-dot {
            background: var(--accent-orange);
            border-color: var(--accent-orange);
            box-shadow: 0 0 0 3px rgba(230,126,34,0.15);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(230,126,34,0.4); }
            70% { box-shadow: 0 0 0 6px rgba(230,126,34,0); }
            100% { box-shadow: 0 0 0 0 rgba(230,126,34,0); }
        }

        .timeline-content {
            background: #f8fafc;
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            margin-left: 8px;
        }

        .timeline-status {
            font-weight: 600;
            font-size: 14px;
            color: var(--text-main);
            margin-bottom: 4px;
        }

        .timeline-desc {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .timeline-time {
            font-size: 11px;
            color: var(--text-light);
        }

        /* 物流信息卡片 */
        .logistics-info {
            background: #f8fafc;
            border-radius: var(--radius-md);
            padding: 16px;
            margin-top: 20px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            font-size: 13px;
            border-bottom: 1px solid #eef2f6;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            color: var(--text-muted);
        }

        .info-value {
            color: var(--text-main);
            font-weight: 500;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }

        .empty-state i {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        /* 加载动画 */
        .loading-state {
            text-align: center;
            padding: 60px 20px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-light);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .logistics-container { padding: 16px; }
            .query-input-group { flex-direction: column; }
            .query-btn { justify-content: center; }
            .order-header { flex-direction: column; }
        }
    </style>
</head>
<body>

<header class="logistics-header">
    <div class="logo"><i class="fas fa-leaf"></i> 绿采智联</div>
    <button class="back-btn" onclick="history.back()"><i class="fas fa-arrow-left"></i> 返回</button>
</header>

<div class="logistics-container">
    <div class="page-title-section">
        <h1>
            <i class="fas fa-truck-fast"></i>
            物流查询
        </h1>
        <p>输入订单号或物流单号，实时追踪货物运输状态</p>
    </div>

    <!-- 查询卡片 -->
    <div class="query-card">
        <div class="query-title">
            <i class="fas fa-search"></i>
            查询物流
        </div>
        <div class="query-input-group">
            <div class="query-input-wrapper">
                <i class="fas fa-box"></i>
                <input type="text" id="trackingNo" placeholder="请输入订单号或物流单号" autocomplete="off">
                <i class="fas fa-qrcode" style="cursor: pointer;" onclick="alert('扫码功能开发中')"></i>
            </div>
            <button class="query-btn" onclick="searchLogistics()">
                <i class="fas fa-search"></i> 查询
            </button>
        </div>
    </div>

    <!-- 最近查询记录 -->
    <div class="recent-section" id="recentSection">
        <div class="recent-title">
            <i class="fas fa-clock"></i>
            最近查询
        </div>
        <div class="recent-tags" id="recentTags"></div>
    </div>

    <!-- 物流详情区域 -->
    <div id="trackResult"></div>
</div>

<script>
    // ========== 模拟物流数据 ==========
    const mockLogisticsData = {
        'SF123456789': {
            orderNo: 'DD20260422001',
            trackingNo: 'SF123456789',
            carrier: '顺丰速运',
            status: 'delivering',
            statusText: '运输中',
            from: '上海市浦东新区仓',
            to: '北京市朝阳区',
            estimatedTime: '2026-04-25 18:00前',
            receiver: '张经理 138****1234',
            timeline: [
                { status: '已揽收', desc: '顺丰速运 已揽收', time: '2026-04-22 14:23:25', completed: true },
                { status: '已发出', desc: '上海转运中心 已发出', time: '2026-04-22 16:45:12', completed: true },
                { status: '运输中', desc: '已到达 南京中转中心', time: '2026-04-23 08:30:00', completed: true },
                { status: '运输中', desc: '已离开 南京中转中心，下一站 北京', time: '2026-04-23 14:20:00', completed: true },
                { status: '派送中', desc: '已到达 北京朝阳区网点，快递员正在派送', time: '2026-04-24 09:15:00', completed: false, current: true },
                { status: '已签收', desc: '签收人：本人签收', time: '预计 2026-04-24 18:00前', completed: false }
            ]
        },
        'YT987654321': {
            orderNo: 'DD20260421002',
            trackingNo: 'YT987654321',
            carrier: '圆通速递',
            status: 'delivered',
            statusText: '已签收',
            from: '深圳市南山区仓',
            to: '广州市天河区',
            estimatedTime: '2026-04-23 12:00前',
            receiver: '李经理 159****5678',
            timeline: [
                { status: '已揽收', desc: '圆通速递 已揽收', time: '2026-04-21 10:15:00', completed: true },
                { status: '已发出', desc: '深圳转运中心 已发出', time: '2026-04-21 13:30:00', completed: true },
                { status: '运输中', desc: '已到达 广州转运中心', time: '2026-04-22 08:45:00', completed: true },
                { status: '派送中', desc: '广州天河区网点 快递员正在派送', time: '2026-04-22 14:20:00', completed: true },
                { status: '已签收', desc: '签收人：本人签收，服务满意', time: '2026-04-22 16:30:00', completed: true }
            ]
        },
        'ZTO555555555': {
            orderNo: 'DD20260420003',
            trackingNo: 'ZTO555555555',
            carrier: '中通快递',
            status: 'processing',
            statusText: '待揽收',
            from: '杭州市余杭区仓',
            to: '南京市建邺区',
            estimatedTime: '2026-04-26 20:00前',
            receiver: '王先生 177****9900',
            timeline: [
                { status: '已下单', desc: '商家已发货，等待快递员揽收', time: '2026-04-20 09:00:00', completed: true },
                { status: '待揽收', desc: '快递员正在取件中', time: '2026-04-20 14:30:00', completed: false, current: true }
            ]
        },
        'EMS666666666': {
            orderNo: 'DD20260419004',
            trackingNo: 'EMS666666666',
            carrier: 'EMS',
            status: 'exception',
            statusText: '异常',
            from: '成都市锦江区仓',
            to: '重庆市渝中区',
            estimatedTime: '延迟配送',
            receiver: '陈女士 189****3333',
            timeline: [
                { status: '已揽收', desc: 'EMS 已揽收', time: '2026-04-19 11:20:00', completed: true },
                { status: '已发出', desc: '成都转运中心 已发出', time: '2026-04-19 15:45:00', completed: true },
                { status: '异常', desc: '因天气原因，运输延迟，正在协调中', time: '2026-04-20 10:00:00', completed: false, current: true }
            ]
        }
    };

    // 最近查询记录存储
    let recentQueries = JSON.parse(localStorage.getItem('recentLogistics') || '[]');

    // 渲染最近查询标签
    function renderRecentTags() {
        const container = document.getElementById('recentTags');
        if (!container) return;
        
        if (recentQueries.length === 0) {
            container.innerHTML = '<span style="color:#94a3b8; font-size:13px;">暂无查询记录</span>';
            return;
        }
        
        container.innerHTML = recentQueries.slice(0, 5).map(no => 
            `<span class="recent-tag" onclick="searchByNumber('${no}')">${no}</span>`
        ).join('');
    }

    // 保存最近查询
    function saveRecentQuery(trackingNo) {
        recentQueries = recentQueries.filter(n => n !== trackingNo);
        recentQueries.unshift(trackingNo);
        if (recentQueries.length > 5) recentQueries.pop();
        localStorage.setItem('recentLogistics', JSON.stringify(recentQueries));
        renderRecentTags();
    }

    // 根据单号搜索
    function searchByNumber(trackingNo) {
        document.getElementById('trackingNo').value = trackingNo;
        searchLogistics();
    }

    // 搜索物流
    function searchLogistics() {
        const trackingNo = document.getElementById('trackingNo').value.trim();
        if (!trackingNo) {
            alert('请输入订单号或物流单号');
            return;
        }
        
        const resultContainer = document.getElementById('trackResult');
        resultContainer.innerHTML = '<div class="loading-state"><div class="spinner"></div><p style="color:#94a3b8;">查询中...</p></div>';
        
        // 模拟网络请求延迟
        setTimeout(() => {
            const data = mockLogisticsData[trackingNo];
            
            if (!data) {
                resultContainer.innerHTML = `
                    <div class="track-card" style="display:block;">
                        <div class="empty-state">
                            <i class="fas fa-truck"></i>
                            <p>未查询到物流信息</p>
                            <p style="font-size:13px; margin-top:8px;">请检查单号是否正确，或稍后再试</p>
                        </div>
                    </div>
                `;
                return;
            }
            
            saveRecentQuery(trackingNo);
            renderTrackDetail(data);
        }, 500);
    }

    // 渲染物流详情
    function renderTrackDetail(data) {
        const statusClass = data.status === 'delivering' ? 'delivering' : 
                           (data.status === 'delivered' ? 'delivered' : 
                           (data.status === 'processing' ? 'processing' : 'exception'));
        const statusTextMap = {
            delivering: '运输中',
            delivered: '已签收',
            processing: '待揽收',
            exception: '异常'
        };
        
        // 渲染时间轴
        let timelineHtml = '';
        data.timeline.forEach((item, index) => {
            let itemClass = '';
            if (item.completed) itemClass = 'completed';
            if (item.current) itemClass = 'current';
            
            timelineHtml += `
                <div class="timeline-item ${itemClass}">
                    <div class="timeline-dot"></div>
                    <div class="timeline-content">
                        <div class="timeline-status">${item.status}</div>
                        <div class="timeline-desc">${item.desc}</div>
                        <div class="timeline-time">${item.time}</div>
                    </div>
                </div>
            `;
        });
        
        const html = `
            <div class="track-card" style="display:block;">
                <div class="order-header">
                    <div class="order-info">
                        <h3>${data.orderNo}</h3>
                        <div class="order-meta">
                            <span><i class="fas fa-truck"></i> 承运商：${data.carrier}</span>
                            <span><i class="fas fa-barcode"></i> 运单号：${data.trackingNo}</span>
                        </div>
                    </div>
                    <div class="status-badge ${statusClass}">${data.statusText}</div>
                </div>
                
                <div class="track-timeline">
                    <div class="timeline-title">
                        <i class="fas fa-timeline"></i> 物流轨迹
                    </div>
                    <div class="timeline-list">
                        ${timelineHtml}
                    </div>
                </div>
                
                <div class="logistics-info">
                    <div class="info-row">
                        <span class="info-label">发货地</span>
                        <span class="info-value">${data.from}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">收货地</span>
                        <span class="info-value">${data.to}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">预计送达</span>
                        <span class="info-value">${data.estimatedTime}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">收货人</span>
                        <span class="info-value">${data.receiver}</span>
                    </div>
                </div>
            </div>
        `;
        
        document.getElementById('trackResult').innerHTML = html;
    }

    // 支持回车查询
    document.getElementById('trackingNo').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') searchLogistics();
    });

    // 初始化
    renderRecentTags();
    
    // 如果有URL参数，自动查询
    const urlParams = new URLSearchParams(window.location.search);
    const orderNo = urlParams.get('orderNo');
    if (orderNo) {
        document.getElementById('trackingNo').value = orderNo;
        searchLogistics();
    }
    
    // 暴露全局函数
    window.searchLogistics = searchLogistics;
    window.searchByNumber = searchByNumber;
</script>
</body>
</html>
