<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>异常订单 - 供应商工作台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f4f7fc; font-family: 'Segoe UI', Roboto, sans-serif; padding: 30px 24px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .card { background: #fff; border-radius: 20px; border: 1px solid #e9edf2; padding: 28px 32px; margin-bottom: 24px; }
        .page-header { display: flex; align-items: center; gap: 20px; margin-bottom: 24px; flex-wrap: wrap; }
        .back-btn { background: none; border: none; font-size: 16px; color: #29a672; cursor: pointer; }
        h2 { color: #1e2a3e; }
        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 14px 12px; text-align: left; border-bottom: 1px solid #edf2f7; }
        th { background: #f8fafc; }
        .btn-handle { background: #e74c3c; color: white; border: none; padding: 6px 18px; border-radius: 30px; cursor: pointer; }
        .status-error { background: #ffebee; color: #c62828; padding: 4px 12px; border-radius: 30px; font-size: 12px; display: inline-block; }
    </style>
</head>
<body>
<div class="container">
    <div class="page-header">
        <button class="back-btn" onclick="history.back()"><i class="fas fa-arrow-left"></i> 返回工作台</button>
        <h2><i class="fas fa-exclamation-triangle" style="color: #e74c3c;"></i> 异常订单 (2项)</h2>
    </div>
    <div class="card">
        <div class="table-responsive">
            <table id="orderTable">
                <thead><tr><th>订单号</th><th>商品</th><th>金额</th><th>异常类型</th><th>状态</th><th>操作</th></tr></thead>
                <tbody id="orderBody"></tbody>
            </table>
        </div>
    </div>
</div>
<script>
    let abnormalOrders = [
        { id: "NO.8829", product: "北京大学实验室耗材", amount: "¥3,250", type: "未付款超时", status: "待处理" },
        { id: "NO.8912", product: "清华大学水质监测仪", amount: "¥12,800", type: "物流异常", status: "待核实" }
    ];
    function renderOrders() {
        const tbody = document.getElementById('orderBody');
        tbody.innerHTML = abnormalOrders.map(o => `
            <tr><td>${o.id}</td><td>${o.product}</td><td>${o.amount}</td><td>${o.type}</td>
            <td><span class="status-error">${o.status}</span></td>
            <td><button class="btn-handle" onclick="handleOrder('${o.id}')">立即处理</button></td></tr>
        `).join('');
    }
    window.handleOrder = (id) => { alert(`正在处理订单 ${id}，请联系客服或物流。`); };
    renderOrders();
</script>
<script>
// 云函数 HTTP 触发地址（固定不变）
const API_BASE = 'https://eco-project-d2grfzzu4ca135e6d-1423499375.ap-shanghai.app.tcloudbase.com';

// 调用云函数
async function callFunction(name, data) {
    const response = await fetch(`${API_BASE}/${name}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data || {})
    });
    return response.json();
}
</script>
</body>
</html>
