<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>偏好设置 - 供应商工作台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f4f7fc; font-family: 'Segoe UI', Roboto, sans-serif; padding: 30px 24px; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: #fff; border-radius: 20px; border: 1px solid #e9edf2; padding: 28px 32px; margin-bottom: 24px; }
        .page-header { display: flex; align-items: center; gap: 20px; margin-bottom: 24px; }
        .back-btn { background: none; border: none; font-size: 16px; color: #29a672; cursor: pointer; }
        h2 { color: #1e2a3e; }
        .setting-item { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid #edf2f7; flex-wrap: wrap; gap: 12px; }
        .setting-label { font-weight: 600; }
        select, input { padding: 8px 16px; border-radius: 30px; border: 1px solid #d0d7de; background: white; }
        .toggle-switch { width: 46px; height: 24px; background: #ccc; border-radius: 30px; cursor: pointer; position: relative; transition: 0.2s; }
        .toggle-switch.active { background: #29a672; }
        .toggle-switch::after { content: ""; width: 20px; height: 20px; background: white; border-radius: 50%; position: absolute; top: 2px; left: 3px; transition: 0.2s; }
        .toggle-switch.active::after { left: 23px; }
        .btn-save { background: #29a672; color: white; border: none; padding: 12px 28px; border-radius: 40px; cursor: pointer; margin-top: 24px; width: 100%; }
    </style>
</head>
<body>
<div class="container">
    <div class="page-header">
        <button class="back-btn" onclick="history.back()"><i class="fas fa-arrow-left"></i> 返回工作台</button>
        <h2><i class="fas fa-cog" style="color: #7f8c8d;"></i> 偏好设置</h2>
    </div>
    <div class="card">
        <div class="setting-item"><span class="setting-label">🌙 夜间模式</span><div class="toggle-switch" id="darkModeToggle"></div></div>
        <div class="setting-item"><span class="setting-label">🔔 新订单通知</span><div class="toggle-switch active" id="orderNotifyToggle"></div></div>
        <div class="setting-item"><span class="setting-label">📧 邮件提醒</span><div class="toggle-switch active" id="emailNotifyToggle"></div></div>
        <div class="setting-item"><span class="setting-label">🌐 默认语言</span><select id="languageSelect"><option value="zh">简体中文</option><option value="en">English</option></select></div>
        <div class="setting-item"><span class="setting-label">📊 首页默认展示</span><select id="defaultView"><option value="dashboard">数据概览</option><option value="orders">订单管理</option><option value="products">商品列表</option></select></div>
        <button class="btn-save" id="saveSettingsBtn"><i class="fas fa-save"></i> 保存设置</button>
    </div>
</div>
<script>
    // 开关组件初始化
    function initToggle(toggleId, isActive) {
        const el = document.getElementById(toggleId);
        if(isActive) el.classList.add('active');
        el.addEventListener('click', () => { el.classList.toggle('active'); });
    }
    initToggle('darkModeToggle', false);
    initToggle('orderNotifyToggle', true);
    initToggle('emailNotifyToggle', true);
    
    document.getElementById('saveSettingsBtn').addEventListener('click', () => {
        const dark = document.getElementById('darkModeToggle').classList.contains('active');
        const orderNotify = document.getElementById('orderNotifyToggle').classList.contains('active');
        const emailNotify = document.getElementById('emailNotifyToggle').classList.contains('active');
        const language = document.getElementById('languageSelect').value;
        const defaultView = document.getElementById('defaultView').value;
        localStorage.setItem('vendor_preferences', JSON.stringify({ dark, orderNotify, emailNotify, language, defaultView }));
        alert('✅ 偏好设置已保存！');
        if(dark) document.body.style.background = "#1a1e2c";
        else document.body.style.background = "#f4f7fc";
    });
    // 加载已保存偏好
    const saved = localStorage.getItem('vendor_preferences');
    if(saved) {
        const prefs = JSON.parse(saved);
        if(prefs.dark) document.body.style.background = "#1a1e2c";
        if(prefs.orderNotify) document.getElementById('orderNotifyToggle').classList.add('active');
        if(prefs.emailNotify) document.getElementById('emailNotifyToggle').classList.add('active');
        if(prefs.language) document.getElementById('languageSelect').value = prefs.language;
        if(prefs.defaultView) document.getElementById('defaultView').value = prefs.defaultView;
    }
</script>
<script>
// 云函数 HTTP 触发地址（固定不变）
const API_BASE = 'https://eco-project-d2grfzzu4ca135e6d-1423499375.ap-shanghai.app.tcloudbase.com';

// 调用云函数
async function callFunction(name, data) {
    const response = await fetch(`${API_BASE}/${name}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data || {})
    });
    return response.json();
}
</script>
</body>
</html>
