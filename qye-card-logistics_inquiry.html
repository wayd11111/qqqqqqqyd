<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物流查询 - 供应商工作台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f4f7fc; font-family: 'Segoe UI', Roboto, sans-serif; padding: 30px 24px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .card { background: #fff; border-radius: 20px; border: 1px solid #e9edf2; padding: 28px 32px; margin-bottom: 24px; }
        .page-header { display: flex; align-items: center; gap: 20px; margin-bottom: 24px; }
        .back-btn { background: none; border: none; font-size: 16px; color: #29a672; cursor: pointer; }
        h2 { color: #1e2a3e; }
        .search-box { display: flex; gap: 12px; margin-bottom: 28px; flex-wrap: wrap; }
        .search-box input { flex: 2; padding: 14px; border: 1px solid #d0d7de; border-radius: 40px; font-size: 14px; }
        .search-box button { background: #29a672; color: white; border: none; padding: 0 28px; border-radius: 40px; cursor: pointer; }
        .track-timeline { border-left: 3px solid #29a672; padding-left: 24px; margin: 20px 0; }
        .track-node { margin-bottom: 24px; position: relative; }
        .track-node::before { content: "●"; position: absolute; left: -31px; color: #29a672; font-size: 14px; }
        .track-time { font-size: 12px; color: #888; margin-bottom: 4px; }
        .track-desc { font-weight: 500; }
        .order-info { background: #f8fafc; padding: 16px; border-radius: 16px; margin-bottom: 20px; }
    </style>
</head>
<body>
<div class="container">
    <div class="page-header">
        <button class="back-btn" onclick="history.back()"><i class="fas fa-arrow-left"></i> 返回工作台</button>
        <h2><i class="fas fa-truck" style="color: #3498db;"></i> 物流查询</h2>
    </div>
    <div class="card">
        <div class="search-box">
            <input type="text" id="trackingNo" placeholder="输入订单号或物流单号" value="SF10892345901">
            <button id="searchTrackBtn"><i class="fas fa-search"></i> 查询</button>
        </div>
        <div id="trackResult">
            <div class="order-info"><strong>📦 订单号：NO.8829</strong><br>商品：北京大学实验室耗材<br>物流公司：顺丰速运 &nbsp; 单号：SF10892345901</div>
            <div class="track-timeline">
                <div class="track-node"><div class="track-time">2025-03-28 14:23</div><div class="track-desc">【北京】已签收，签收人：李老师</div></div>
                <div class="track-node"><div class="track-time">2025-03-27 09:15</div><div class="track-desc">【北京】正在派送中，快递员：王师傅</div></div>
                <div class="track-node"><div class="track-time">2025-03-26 18:40</div><div class="track-desc">【杭州】已发往北京中转中心</div></div>
                <div class="track-node"><div class="track-time">2025-03-25 10:00</div><div class="track-desc">商家已发货，等待揽收</div></div>
            </div>
        </div>
    </div>
</div>
<script>
    document.getElementById('searchTrackBtn').addEventListener('click', () => {
        const no = document.getElementById('trackingNo').value;
        if(!no) { alert('请输入订单号或物流单号'); return; }
        alert(`查询物流单号：${no}\n演示模式：当前展示示例物流轨迹。`);
    });
</script>
<script>
// 云函数 HTTP 触发地址（固定不变）
const API_BASE = 'https://eco-project-d2grfzzu4ca135e6d-1423499375.ap-shanghai.app.tcloudbase.com';

// 调用云函数
async function callFunction(name, data) {
    const response = await fetch(`${API_BASE}/${name}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data || {})
    });
    return response.json();
}
</script>
</body>
</html>
