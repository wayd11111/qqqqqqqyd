<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活跃供应商 - 供应商工作台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f4f7fc; font-family: 'Segoe UI', Roboto, sans-serif; padding: 30px 24px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .card { background: #fff; border-radius: 20px; border: 1px solid #e9edf2; padding: 28px 32px; margin-bottom: 24px; }
        .page-header { display: flex; align-items: center; gap: 20px; margin-bottom: 24px; flex-wrap: wrap; }
        .back-btn { background: none; border: none; font-size: 16px; color: #29a672; cursor: pointer; }
        h2 { color: #1e2a3e; }
        .supplier-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr)); gap: 20px; }
        .supplier-card { border: 1px solid #e9edf2; border-radius: 20px; padding: 20px; transition: 0.2s; background: #fff; }
        .supplier-card:hover { box-shadow: 0 6px 14px rgba(0,0,0,0.05); }
        .supplier-name { font-size: 18px; font-weight: bold; display: flex; justify-content: space-between; }
        .contact-btn { background: #29a672; color: white; border: none; padding: 8px 16px; border-radius: 30px; cursor: pointer; margin-top: 12px; width: 100%; }
    </style>
</head>
<body>
<div class="container">
    <div class="page-header">
        <button class="back-btn" onclick="history.back()"><i class="fas fa-arrow-left"></i> 返回工作台</button>
        <h2><i class="fas fa-handshake" style="color: #29a672;"></i> 活跃供应商 (18家)</h2>
    </div>
    <div class="card">
        <div class="supplier-grid" id="supplierGrid"></div>
    </div>
</div>
<script>
    const suppliers = [
        { name: "弘信科技", contact: "陈敏", phone: "138****1234", products: "实验室器材", lastOrder: "2025-03-25" },
        { name: "优美家居", contact: "李芳", phone: "159****5678", products: "办公家具", lastOrder: "2025-03-22" },
        { name: "浪潮云伙伴", contact: "王磊", phone: "186****9012", products: "服务器/存储", lastOrder: "2025-03-20" },
        { name: "顺丰供应链", contact: "王雅琳", phone: "150****3456", products: "物流服务", lastOrder: "2025-03-28" },
        { name: "赛默飞代理", contact: "张工", phone: "177****7890", products: "精密仪器", lastOrder: "2025-03-18" },
        { name: "麦秆科技", contact: "赵岩", phone: "182****2345", products: "环保材料", lastOrder: "2025-03-15" }
    ];
    const grid = document.getElementById('supplierGrid');
    grid.innerHTML = suppliers.map(s => `
        <div class="supplier-card">
            <div class="supplier-name">${s.name} <i class="fas fa-check-circle" style="color:#29a672;"></i></div>
            <div style="margin:12px 0; font-size:13px; color:#555;">联系人：${s.contact}<br>主营：${s.products}<br>最近合作：${s.lastOrder}</div>
            <button class="contact-btn" onclick="alert('联系 ${s.contact} 电话 ${s.phone}')"><i class="fas fa-phone-alt"></i> 联系供应商</button>
        </div>
    `).join('');
</script>
<script>
// 云函数 HTTP 触发地址（固定不变）
const API_BASE = 'https://eco-project-d2grfzzu4ca135e6d-1423499375.ap-shanghai.app.tcloudbase.com';

// 调用云函数
async function callFunction(name, data) {
    const response = await fetch(`${API_BASE}/${name}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data || {})
    });
    return response.json();
}
</script>
</body>
</html>
